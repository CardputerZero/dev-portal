# Copy to CardputerZero/packages: .github/workflows/process-web-submission.yml
#
# Handles `repository_dispatch` (type: web-submission) sent by the developer
# portal Worker. Authoritative validation with real dpkg-deb: integrity,
# control fields, .desktop, structure & safety scan, first-come-first-served
# ownership (the package name belongs to the GitHub login that first uploaded
# it, recorded as `uploaded_by`; admins bypass), and version monotonicity. On
# success it opens a publish PR (and can auto-merge it when AUTO_MERGE is true);
# on failure it opens an issue mentioning the submitter.

name: Process Web Submission

on:
  repository_dispatch:
    types: [web-submission]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  # Set to "false" to require a human maintainer to merge every publish PR.
  AUTO_MERGE: "true"

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev jq zstd

      - name: Download and validate .deb
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEB_URL: ${{ github.event.client_payload.url }}
          WANT_SHA: ${{ github.event.client_payload.sha256 }}
          SUBMITTER: ${{ github.event.client_payload.login }}
          # JSON array of the submitter's verified emails (from the Worker,
          # which read them via the user's OAuth token — trusted).
          EMAILS_JSON: ${{ toJSON(github.event.client_payload.emails) }}
          IS_ADMIN: ${{ github.event.client_payload.is_admin }}
        run: |
          set -uo pipefail
          ERR=""
          curl -fL --retry 3 --max-time 600 -o /tmp/pkg.deb "$DEB_URL" || ERR="- ❌ could not download the uploaded .deb\n"
          if [ -f /tmp/pkg.deb ]; then
            GOT=$(sha256sum /tmp/pkg.deb | awk '{print $1}')
            [ "$GOT" = "$WANT_SHA" ] || ERR="${ERR}- ❌ sha256 mismatch\n"
            PKG=$(dpkg-deb -f /tmp/pkg.deb Package 2>/dev/null || true)
            VER=$(dpkg-deb -f /tmp/pkg.deb Version 2>/dev/null || true)
            ARCH=$(dpkg-deb -f /tmp/pkg.deb Architecture 2>/dev/null || true)
            MAINT=$(dpkg-deb -f /tmp/pkg.deb Maintainer 2>/dev/null || true)
            [ -n "$PKG" ] || ERR="${ERR}- ❌ not a valid .deb\n"
            echo "$PKG" | grep -qP '^[a-z0-9][a-z0-9.+\-]+$' || ERR="${ERR}- ❌ invalid package name '$PKG'\n"
            case "$ARCH" in arm64|all) ;; *) ERR="${ERR}- ❌ architecture must be arm64/all, got '$ARCH'\n" ;; esac

            dpkg-deb -c /tmp/pkg.deb > /tmp/contents.txt 2>/dev/null || true
            grep -q 'usr/share/APPLaunch/applications/.*\.desktop$' /tmp/contents.txt \
              || ERR="${ERR}- ❌ missing usr/share/APPLaunch/applications/*.desktop\n"

            # --- structure & safety scan ---
            # setuid/setgid bits in the archive listing (perm string like -rwsr-xr-x)
            if awk '{print $1}' /tmp/contents.txt | grep -qE '^[-l].{2}[sS]|^[-l].{5}[sS]'; then
              ERR="${ERR}- ❌ package contains setuid/setgid files\n"
            fi
            # device files
            if awk '{print $1}' /tmp/contents.txt | grep -qE '^[bc]'; then
              ERR="${ERR}- ❌ package contains device files\n"
            fi
            # paths outside the allowed prefixes
            BAD_PATHS=$(awk '{print $NF}' /tmp/contents.txt | sed 's|^\./||' \
              | grep -vE '^(usr/share/APPLaunch/|lib/systemd/system/|usr/share/doc/|usr/share/'"$PKG"'/|usr/lib/'"$PKG"'/|opt/'"$PKG"'/|usr/$|usr/share/$|usr/lib/$|lib/$|lib/systemd/$|opt/$|\.$)' \
              | grep -v '/$' || true)
            if [ -n "$BAD_PATHS" ]; then
              ERR="${ERR}- ❌ files outside allowed install prefixes:\n$(echo "$BAD_PATHS" | sed 's/^/    /')\n"
            fi
            # maintainer scripts: dangerous patterns
            dpkg-deb -e /tmp/pkg.deb /tmp/ctrl 2>/dev/null || true
            for scr in preinst postinst prerm postrm; do
              [ -f "/tmp/ctrl/$scr" ] || continue
              if grep -qE 'rm[[:space:]]+(-[a-zA-Z]+[[:space:]]+)*(/([[:space:]]|$)|/(bin|etc|usr|var|home|boot|lib))|(curl|wget)[^|]*\|[[:space:]]*(ba)?sh|mkfs|/etc/(passwd|shadow|sudoers)|dd[[:space:]][^|]*of=/dev/' "/tmp/ctrl/$scr"; then
                ERR="${ERR}- ❌ dangerous pattern in maintainer script $scr\n"
              fi
            done

            # --- ownership: package names are first-come-first-served, keyed on
            #     the uploader's GitHub login (recorded as `uploaded_by` in the
            #     release manifest). Existing packages are only updatable by the
            #     recorded owner or an admin. No email-vs-account matching. ---
            EXISTING="" ; LATEST_MANIFEST=""
            for m in pool/main/"$PKG"/*.deb.release.json; do
              [ -f "$m" ] || continue
              v=$(jq -r '.version // empty' "$m")
              if [ -n "$v" ] && { [ -z "$EXISTING" ] || dpkg --compare-versions "$v" gt "$EXISTING"; }; then
                EXISTING="$v"; LATEST_MANIFEST="$m"
              fi
            done
            OWNER_LOGIN=""
            if [ -n "$LATEST_MANIFEST" ]; then
              OWNER_LOGIN=$(jq -r '.uploaded_by // empty' "$LATEST_MANIFEST" | tr '[:upper:]' '[:lower:]')
              # Legacy manifests have no `uploaded_by`: derive the owner login
              # from the published binary's Maintainer noreply address.
              if [ -z "$OWNER_LOGIN" ]; then
                u=$(jq -r '.url // empty' "$LATEST_MANIFEST")
                if [ -n "$u" ] && curl -fsL --max-time 300 -o /tmp/existing.deb "$u" 2>/dev/null; then
                  OM=$(dpkg-deb -f /tmp/existing.deb Maintainer 2>/dev/null | grep -oP '<\K[^>]+' | tr '[:upper:]' '[:lower:]' || true)
                  OWNER_LOGIN=$(printf '%s' "$OM" | sed -nE 's/^([0-9]+\+)?([^@]+)@users\.noreply\.github\.com$/\2/p')
                fi
              fi
            fi
            SUBMITTER_LC=$(printf '%s' "$SUBMITTER" | tr '[:upper:]' '[:lower:]')
            if [ -n "$OWNER_LOGIN" ] && [ "$IS_ADMIN" != "true" ] && [ "$OWNER_LOGIN" != "$SUBMITTER_LC" ]; then
              ERR="${ERR}- ❌ package '$PKG' is owned by @$OWNER_LOGIN; only the original uploader or an admin can update it\n"
            fi
            if [ -n "$EXISTING" ] && dpkg --compare-versions "$VER" le "$EXISTING"; then
              ERR="${ERR}- ❌ version $VER is not newer than published $EXISTING\n"
            fi
            { echo "pkg=$PKG"; echo "ver=$VER"; echo "arch=$ARCH"; } >> "$GITHUB_OUTPUT"
          fi
          printf 'errors<<EOM\n%b\nEOM\n' "$ERR" >> "$GITHUB_OUTPUT"

      - name: Collect store metadata
        id: meta
        if: steps.validate.outputs.errors == ''
        env:
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          PKG: ${{ steps.validate.outputs.pkg }}
          SUBMITTER: ${{ github.event.client_payload.login }}
          STORE_JSON: ${{ toJSON(github.event.client_payload.store) }}
        run: |
          set -uo pipefail
          ERR=""
          if [ -n "$SOURCE_REPO" ]; then
            git clone --depth=1 "$SOURCE_REPO" /tmp/src 2>/dev/null || ERR="- ❌ could not clone source repo\n"
          fi
          if [ -z "$ERR" ]; then
            python3 - <<'EOF' || ERR="- ❌ $(cat /tmp/meta-error.txt 2>/dev/null || echo metadata collection failed)\n"
          import json, os, shutil, subprocess, sys
          from pathlib import Path

          def fail(msg):
              Path("/tmp/meta-error.txt").write_text(msg)
              sys.exit(1)

          pkg = os.environ["PKG"]
          dest = Path(f"pool/main/{pkg}")
          dest.mkdir(parents=True, exist_ok=True)

          import hashlib, urllib.request

          PNG_SIG = b"\x89PNG\r\n\x1a\n"
          def png_dims(data):
              if len(data) < 24 or data[:8] != PNG_SIG:
                  return None
              return int.from_bytes(data[16:20], "big"), int.from_bytes(data[20:24], "big")

          def download(url, want_sha, out_path):
              req = urllib.request.Request(url, headers={"User-Agent": "cz-web-submit"})
              data = urllib.request.urlopen(req, timeout=120).read()
              if want_sha and hashlib.sha256(data).hexdigest() != want_sha:
                  fail(f"checksum mismatch for {url}")
              out_path.write_bytes(data)
              return data

          # Highest priority: store metadata + images supplied directly from the
          # web form. Screenshots/icon are small PNGs uploaded to the buffer
          # Release; we download and commit them into pool/main/<pkg>/ (no LFS).
          try:
              web = json.loads(os.environ.get("STORE_JSON") or "null")
          except Exception:
              web = None
          if isinstance(web, dict):
              meta = {"title": web.get("title") or pkg,
                      "summary": web.get("summary", ""),
                      "categories": web.get("categories", []),
                      "screenshots": []}
              if web.get("description"):
                  meta["description"] = web["description"]
              shots_dir = dest / "screenshots"
              shots_dir.mkdir(exist_ok=True)
              for i, sh in enumerate(web.get("screenshots") or []):
                  name = Path(sh.get("name") or f"screenshot-{i}.png").name
                  data = download(sh["url"], sh.get("sha256"), shots_dir / name)
                  if png_dims(data) != (320, 170):
                      fail(f"screenshot {name} must be 320x170, got {png_dims(data)}")
                  meta["screenshots"].append(f"screenshots/{name}")
              icon = web.get("icon") or {}
              if icon.get("url"):
                  iname = Path(icon.get("name") or f"{pkg}_icon.png").name
                  idata = download(icon["url"], icon.get("sha256"), dest / iname)
                  if png_dims(idata) is None:
                      fail("icon must be a PNG")
                  meta["icon"] = iname
              meta["author"] = {"github": os.environ.get("SUBMITTER", "")}
              (dest / "meta.json").write_text(json.dumps(meta, indent=2, ensure_ascii=False))
              sys.exit(0)

          # Preferred: app-builder.json store section from the source repo.
          src_root = Path("/tmp/src")
          if src_root.is_dir():
              for mf in src_root.rglob("app-builder.json"):
                  try:
                      raw = json.loads(mf.read_text())
                  except Exception:
                      continue
                  if raw.get("package_name") != pkg or "store" not in raw:
                      continue
                  store, app_dir = raw["store"], mf.parent
                  meta = {"title": raw.get("app_name", ""),
                          "summary": store.get("summary", ""),
                          "categories": store.get("categories", []),
                          "screenshots": store.get("screenshots", [])}
                  for k in ("description", "locales", "license", "source_repo", "icon", "permissions"):
                      if store.get(k):
                          meta[k] = store[k]
                  shots = dest / "screenshots"
                  shots.mkdir(exist_ok=True)
                  for srel in meta["screenshots"]:
                      p = app_dir / srel
                      if not p.is_file():
                          fail(f"screenshot not found in source repo: {srel}")
                      shutil.copy2(p, shots / p.name)
                  if store.get("icon") and (app_dir / store["icon"]).is_file():
                      shutil.copy2(app_dir / store["icon"], dest / Path(store["icon"]).name)
                  (dest / "meta.json").write_text(json.dumps(meta, indent=2, ensure_ascii=False))
                  sys.exit(0)

          # Fallback: build minimal metadata from the deb itself (.desktop + icon).
          out = subprocess.run(["dpkg-deb", "--fsys-tarfile", "/tmp/pkg.deb"], capture_output=True, check=True)
          import io, tarfile
          tf = tarfile.open(fileobj=io.BytesIO(out.stdout))
          desktop, icon_member = None, None
          members = {m.name.lstrip("./"): m for m in tf.getmembers()}
          for name, m in members.items():
              if name.startswith("usr/share/APPLaunch/applications/") and name.endswith(".desktop"):
                  desktop = tf.extractfile(m).read().decode(errors="replace")
                  break
          title, icon_rel = pkg, None
          if desktop:
              for line in desktop.splitlines():
                  if line.startswith("Name="):
                      title = line.split("=", 1)[1].strip()
                  if line.startswith("Icon="):
                      icon_rel = line.split("=", 1)[1].strip().lstrip("/")
          if icon_rel:
              for cand in (icon_rel, f"usr/share/APPLaunch/{icon_rel}"):
                  if cand in members:
                      data = tf.extractfile(members[cand]).read()
                      (dest / Path(cand).name).write_bytes(data)
                      icon_rel = Path(cand).name
                      break
              else:
                  icon_rel = None
          desc = subprocess.run(["dpkg-deb", "-f", "/tmp/pkg.deb", "Description"],
                                capture_output=True, text=True).stdout.strip()
          meta = {"title": title, "summary": desc.splitlines()[0] if desc else "",
                  "categories": [], "screenshots": []}
          if icon_rel:
              meta["icon"] = icon_rel
          (dest / "meta.json").write_text(json.dumps(meta, indent=2, ensure_ascii=False))
          EOF
          fi
          printf 'errors<<EOM\n%b\nEOM\n' "$ERR" >> "$GITHUB_OUTPUT"

      - name: Create publish PR
        id: pr
        if: steps.validate.outputs.errors == '' && steps.meta.outputs.errors == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEB_URL: ${{ github.event.client_payload.url }}
          WANT_SHA: ${{ github.event.client_payload.sha256 }}
          SIZE: ${{ github.event.client_payload.size }}
          SUBMITTER: ${{ github.event.client_payload.login }}
          EMAILS_JSON: ${{ toJSON(github.event.client_payload.emails) }}
          PKG: ${{ steps.validate.outputs.pkg }}
          VER: ${{ steps.validate.outputs.ver }}
          ARCH: ${{ steps.validate.outputs.arch }}
        run: |
          set -euo pipefail
          NAME="${PKG}_${VER}_${ARCH}.deb"
          ASSET_NAME="${NAME//\~/.}"
          # Ownership record: first uploader of a package name owns it. The login
          # is the authoritative owner key; the email is kept for contact/audit.
          UPLOADER_EMAIL=$(echo "$EMAILS_JSON" | jq -r '.[0] // empty')
          [ -n "$UPLOADER_EMAIL" ] || UPLOADER_EMAIL="${SUBMITTER}@users.noreply.github.com"
          jq -n --arg f "$ASSET_NAME" --arg u "$DEB_URL" --arg s "$WANT_SHA" \
                --arg p "$PKG" --arg v "$VER" --arg a "$ARCH" --argjson z "$SIZE" \
                --arg by "$SUBMITTER" --arg em "$UPLOADER_EMAIL" \
                '{filename:$f,url:$u,sha256:$s,size:$z,package:$p,version:$v,architecture:$a,uploaded_by:$by,uploader_email:$em}' \
                > "pool/main/$PKG/$ASSET_NAME.release.json"
          BRANCH="publish/${PKG}-${VER}-web-${{ github.run_id }}"
          git config user.name "cardputerzero-bot"
          git config user.email "cardputerzero-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "pool/main/$PKG"
          git commit -m "publish: $PKG $VER ($ARCH) via developer portal by @$SUBMITTER"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "publish: $PKG $VER (portal submission by @$SUBMITTER)" \
            --body "$(printf 'Submitted by @%s via the developer portal.\n\n| Field | Value |\n|---|---|\n| Version | %s |\n| Architecture | %s |\n| SHA-256 | `%s` |\n| Binary | [%s](%s) |\n\nAll automated checks passed in [this run](%s/%s/actions/runs/%s).' \
              "$SUBMITTER" "$VER" "$ARCH" "$WANT_SHA" "$ASSET_NAME" "$DEB_URL" "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}")")
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          if [ "$AUTO_MERGE" = "true" ]; then
            gh pr merge "$PR_URL" --squash --delete-branch || echo "::warning::auto-merge failed; awaiting manual review"
          fi

      - name: Report failure to the submitter
        if: always() && (steps.validate.outputs.errors != '' || steps.meta.outputs.errors != '' || failure())
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUBMITTER: ${{ github.event.client_payload.login }}
          FILENAME: ${{ github.event.client_payload.filename }}
          ERR1: ${{ steps.validate.outputs.errors }}
          ERR2: ${{ steps.meta.outputs.errors }}
        run: |
          {
            echo "@$SUBMITTER your portal submission of \`$FILENAME\` failed validation:"
            echo
            printf '%b%b' "$ERR1" "$ERR2"
            echo
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "Fix the package and upload again at https://dev.cardputer.cc"
          } > /tmp/issue.md
          gh issue create \
            --title "portal submission failed: $FILENAME" \
            --body-file /tmp/issue.md
